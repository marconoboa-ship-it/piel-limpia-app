<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Piel Limpia</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --verde-primario: #1c5c32;
            --verde-claro: #f4f7f6;
            --dorado: #D4AF37;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--verde-claro);
            margin: 0;
            padding: 0;
            color: #333;
        }

        /* BARRA SUPERIOR RESTAURADA (NAVBAR) */
        .navbar {
            background-color: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-left {
            display: flex;
            align-items: center;
        }

        .nav-left img {
            height: 40px; /* Logo a la izquierda */
            object-fit: contain;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-email {
            font-size: 13px;
            color: #666;
            font-weight: 500;
        }

        /* Botones Originales de la Navbar */
        .btn-premium {
            background: linear-gradient(135deg, #D4AF37, #AA8222);
            color: white;
            padding: 8px 18px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            font-size: 13px;
            box-shadow: 0 4px 10px rgba(212, 175, 55, 0.3);
            transition: transform 0.2s;
        }

        .btn-premium:hover {
            transform: translateY(-2px);
        }

        .btn-logout {
            background: transparent;
            color: var(--verde-primario);
            border: 1px solid var(--verde-primario);
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-logout:hover {
            background: var(--verde-primario);
            color: white;
        }

        /* CONTENEDOR PRINCIPAL AMPLIO */
        .main-content {
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .dashboard-container {
            width: 100%;
            max-width: 700px; /* Más ancho, como un software real */
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            box-sizing: border-box;
        }

        /* Títulos y Progreso */
        .header-title {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header-title h2 {
            font-size: 24px;
            margin: 0;
            color: #1a1a1a;
        }

        .progress-section {
            margin-bottom: 35px;
        }

        .progress-bar-bg {
            background: #e2e8f0;
            height: 12px;
            border-radius: 10px;
            overflow: hidden;
        }

        #progress-fill {
            background: linear-gradient(90deg, #1c5c32, #2d8a4e);
            height: 100%;
            width: 0%;
            transition: width 0.5s ease;
        }

        /* Calendario de 21 Días Estable */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr); 
            gap: 15px; 
            margin-bottom: 40px;
        }

        .day-box {
            aspect-ratio: 1; 
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            border: 2px solid #eaeaea;
            color: #bbb;
            background-color: #fafafa;
        }

        .day-active {
            border-color: var(--verde-primario);
            color: var(--verde-primario);
            background-color: #e6f0e9;
            transform: scale(1.05); 
            box-shadow: 0 4px 10px rgba(28, 92, 50, 0.15);
        }

        .day-completed {
            background-color: var(--verde-primario);
            color: white;
            border-color: var(--verde-primario);
        }

        /* Tareas del Día (Limpias y elegantes) */
        .task-list h3 {
            font-size: 18px;
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 12px 10px;
            margin-bottom: 5px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
            font-size: 15px;
            font-weight: 500;
            color: #444;
        }

        .task-item:hover { background: #f8fafc; }

        .checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid var(--verde-primario);
            border-radius: 6px;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .checked .checkbox::after {
            content: '✓';
            color: var(--verde-primario);
            font-weight: bold;
            font-size: 16px;
        }
        
        .checked span {
            text-decoration: line-through;
            color: #aaa;
        }

        /* Responsividad básica para celulares */
        @media (max-width: 600px) {
            .navbar { flex-direction: column; gap: 15px; padding: 15px; }
            .nav-right { flex-wrap: wrap; justify-content: center; }
            .user-email { display: none; } /* Ocultar correo en móvil para ahorrar espacio */
            .calendar-grid { gap: 8px; }
            .day-box { font-size: 13px; border-radius: 8px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <img src="logo.png" alt="Piel Limpia">
        </div>
        <div class="nav-right">
            <span class="user-email" id="display-email">Cargando usuario...</span>
            <a href="Paywall.html" class="btn-premium">👑 Upgrade VIP</a>
            <button id="btn-logout" class="btn-logout">Cerrar Sesión</button>
        </div>
    </nav>

    <div class="main-content">
        <div class="dashboard-container">
            
            <div class="header-title">
                <h2 id="day-title">Día 1: Iniciando tu Protocolo</h2>
            </div>

            <div class="progress-section">
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; font-weight: 700; color: #555;">
                    <span>Tu Progreso General</span>
                    <span id="progress-text">0%</span>
                </div>
                <div class="progress-bar-bg">
                    <div id="progress-fill"></div>
                </div>
            </div>

            <div id="calendar" class="calendar-grid">
                </div>

            <div class="task-list" id="task-container">
                <h3>Tareas de Hoy:</h3>
                <div class="task-item" onclick="toggleTask(this)">
                    <div class="checkbox"></div>
                    <span>Limpieza Facial Am/Pm (Doble limpieza)</span>
                </div>
                <div class="task-item" onclick="toggleTask(this)">
                    <div class="checkbox"></div>
                    <span>Tomar Suplemento Control Acné</span>
                </div>
                <div class="task-item" onclick="toggleTask(this)">
                    <div class="checkbox"></div>
                    <span>Batido Detox / Nutrición Celular</span>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBR-Mh0UMUWuTC1kAj2TRc9Zz9z94VDoYQ",
          authDomain: "portal-piel-limpia.firebaseapp.com",
          projectId: "portal-piel-limpia",
          storageBucket: "portal-piel-limpia.firebasestorage.app",
          messagingSenderId: "398053436634",
          appId: "1:398053436634:web:08d83ef125b0f8080009e3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Seguridad y Mostrar Correo en la Barra
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "index.html"; 
            } else {
                // AQUÍ RESTAURAMOS EL CORREO EN LA PARTE SUPERIOR DERECHA
                document.getElementById('display-email').innerText = user.email;
                inicializarDashboard(user);
            }
        });

        document.getElementById('btn-logout').addEventListener('click', () => {
            const btn = document.getElementById('btn-logout');
            btn.innerText = "Saliendo...";
            signOut(auth).then(() => {
                window.location.href = "index.html";
            }).catch((error) => console.error(error));
        });

        // Motor del Tiempo
        function inicializarDashboard(user) {
            const calendarEl = document.getElementById('calendar');
            const creationTime = user.metadata.creationTime;
            const startDate = new Date(creationTime);
            const today = new Date();
            
            const diffTime = Math.abs(today - startDate);
            const currentDay = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            document.getElementById('day-title').innerText = `Día ${currentDay}: Protocolo Activo`;

            calendarEl.innerHTML = "";
            for (let i = 1; i <= 21; i++) {
                const dayBox = document.createElement('div');
                dayBox.classList.add('day-box');
                dayBox.innerText = i;
                
                if (i < currentDay) dayBox.classList.add('day-completed');
                else if (i === currentDay) dayBox.classList.add('day-active');
                
                calendarEl.appendChild(dayBox);
            }

            const progress = Math.min(Math.round(((currentDay - 1) / 21) * 100), 100);
            document.getElementById('progress-fill').style.width = progress + "%";
            document.getElementById('progress-text').innerText = progress + "%";
        }
    </script>

    <script>
        function toggleTask(element) {
            element.classList.toggle('checked');
        }
    </script>
</body>
</html>
