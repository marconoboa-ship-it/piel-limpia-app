<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piel Limpia - Clínica Virtual</title>
    <style>
        /* Estética Clínica y Limpia */
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .login-container {
            background-color: #fff;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo-text {
            font-size: 24px;
            font-weight: bold;
            color: #2c7a7b; /* Verde Clínico */
            margin-bottom: 5px;
            letter-spacing: 1px;
        }
        .subtitle {
            font-size: 14px;
            color: #777;
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            font-size: 13px;
            margin-bottom: 5px;
            color: #555;
            font-weight: bold;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        .input-group input:focus {
            border-color: #2c7a7b;
            outline: none;
        }
        .btn-main {
            width: 100%;
            background-color: #2c7a7b;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-bottom: 15px;
        }
        .btn-main:hover {
            background-color: #235f5f;
        }
        .toggle-text {
            font-size: 14px;
            color: #666;
        }
        .toggle-text span {
            color: #2c7a7b;
            font-weight: bold;
            cursor: pointer;
        }
        .toggle-text span:hover {
            text-decoration: underline;
        }
        #error-message {
            color: #e53e3e;
            font-size: 13px;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-text">PIEL LIMPIA</div>
        <div class="subtitle" id="form-subtitle">Ingresa a tu clínica digital</div>

        <form id="auth-form">
            <div class="input-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" required placeholder="tu@correo.com">
            </div>
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required placeholder="Mínimo 6 caracteres">
            </div>
            
            <button type="submit" class="btn-main" id="submit-btn">Entrar al Reto</button>
        </form>

        <div id="error-message"></div>

        <div class="toggle-text" id="toggle-container">
            ¿No tienes cuenta? <span id="toggle-btn">Regístrate gratis aquí</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBR-Mh0UMUWuTC1kAj2TRc9Zz9z94VDoYQ",
          authDomain: "portal-piel-limpia.firebaseapp.com",
          projectId: "portal-piel-limpia",
          storageBucket: "portal-piel-limpia.firebasestorage.app",
          messagingSenderId: "398053436634",
          appId: "1:398053436634:web:08d83ef125b0f8080009e3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Variables de la interfaz
        let isLogin = true; 
        const form = document.getElementById('auth-form');
        const submitBtn = document.getElementById('submit-btn');
        const toggleBtn = document.getElementById('toggle-btn');
        const subtitle = document.getElementById('form-subtitle');
        const toggleContainer = document.getElementById('toggle-container');
        const errorMsg = document.getElementById('error-message');

        // Cambiar entre Login y Registro
        toggleBtn.addEventListener('click', () => {
            isLogin = !isLogin;
            if (isLogin) {
                subtitle.innerText = "Ingresa a tu clínica digital";
                submitBtn.innerText = "Entrar al Reto";
                toggleContainer.innerHTML = '¿No tienes cuenta? <span id="toggle-btn" style="color: #2c7a7b; font-weight: bold; cursor: pointer;">Regístrate gratis aquí</span>';
            } else {
                subtitle.innerText = "Comienza tu transformación de 21 días";
                submitBtn.innerText = "Crear Mi Cuenta Gratis";
                toggleContainer.innerHTML = '¿Ya tienes cuenta? <span id="toggle-btn" style="color: #2c7a7b; font-weight: bold; cursor: pointer;">Inicia sesión aquí</span>';
            }
            
            // Re-asignar evento al nuevo botón generado
            document.getElementById('toggle-btn').addEventListener('click', toggleBtn.click);
            errorMsg.style.display = 'none';
        });

        // Procesar el formulario
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            submitBtn.innerText = "Cargando...";

            if (isLogin) {
                // INICIAR SESIÓN
                signInWithEmailAndPassword(auth, email, password)
                    .then((userCredential) => {
                        window.location.href = "DashboardLite.html"; // Éxito
                    })
                    .catch((error) => {
                        errorMsg.innerText = "Error: Correo o contraseña incorrectos.";
                        errorMsg.style.display = 'block';
                        submitBtn.innerText = "Entrar al Reto";
                    });
            } else {
                // CREAR CUENTA NUEVA
                createUserWithEmailAndPassword(auth, email, password)
                    .then((userCredential) => {
                        window.location.href = "DashboardLite.html"; // Éxito
                    })
                    .catch((error) => {
                        errorMsg.innerText = "Error: " + error.message;
                        errorMsg.style.display = 'block';
                        submitBtn.innerText = "Crear Mi Cuenta Gratis";
                    });
            }
        });
    </script>
</body>
</html>
