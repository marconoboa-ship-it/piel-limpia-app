<!DOCTYPE html>
<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Piel Limpia - Portal Clínico</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: { extend: { colors: { "primary": "#1b6d24", "primary-container": "#a3f69c", "on-primary-container": "#065f18", "surface": "#f4f7f5", "on-surface": "#2d3435" } } }
        }
    </script>
<style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .gold-gradient { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
    @media (min-width: 1024px) { .main-grid { display: grid; grid-template-columns: 280px 1fr 300px; gap: 2rem; align-items: start; } }
</style>
</head>
<body class="bg-surface font-body text-on-surface antialiased">

<div id="loader" class="fixed inset-0 z-[100] bg-white flex items-center justify-center">
    <div class="flex flex-col items-center gap-4">
        <span class="material-symbols-outlined animate-spin text-primary text-5xl">autorenew</span>
        <p class="text-xs font-bold tracking-widest text-primary uppercase">Sincronizando con la nube...</p>
    </div>
</div>

<header class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md flex justify-between items-center px-8 h-16 border-b border-slate-200">
    <div class="flex items-center gap-2">
        <span class="material-symbols-outlined text-primary text-3xl">spa</span>
        <span class="text-lg font-black tracking-tighter text-primary uppercase font-headline">Piel Limpia</span>
    </div>
    <div class="flex items-center gap-4">
        <span id="user-email" class="text-xs font-medium text-slate-500 hidden md:block"></span>
        <a href="Paywall.html" class="px-4 py-2 bg-primary-container text-on-primary-container rounded-lg text-[10px] font-black tracking-widest no-underline shadow-sm">UPGRADE PREMIUM</a>
    </div>
</header>

<div class="pt-24 pb-32 px-4 md:px-8 max-w-7xl mx-auto">
    <div class="main-grid">
        <aside class="order-2 lg:order-1">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                <h3 class="text-[10px] font-black tracking-widest text-slate-400 uppercase mb-4">Calendario 21 Días</h3>
                <div class="flex lg:grid lg:grid-cols-4 gap-2 overflow-x-auto lg:overflow-visible">
                    <script>
                        for(let i=1; i<=21; i++) {
                            const activeClass = i <= 7 ? 'bg-primary text-white shadow-lg' : 'bg-slate-50 text-slate-400 border border-slate-100';
                            document.write(`<div class="flex-shrink-0 w-12 h-12 lg:w-full lg:h-12 flex items-center justify-center rounded-xl font-bold text-sm ${activeClass}">${i}</div>`);
                        }
                    </script>
                </div>
            </div>
        </aside>

        <main class="order-1 lg:order-2 space-y-6">
            <section class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 flex flex-col items-center relative overflow-hidden">
                <div id="reward-badge" class="absolute top-4 right-4 bg-amber-100 text-amber-700 px-3 py-1 rounded-full text-[10px] font-black tracking-widest flex items-center gap-1">
                    <span class="material-symbols-outlined text-sm">redeem</span> RECOMPENSA ACTIVA
                </div>
                <div class="relative flex items-center justify-center">
                    <svg class="w-44 h-44 transform -rotate-90">
                        <circle class="text-slate-100" cx="88" cy="88" fill="transparent" r="80" stroke="currentColor" stroke-width="10"></circle>
                        <circle id="progress-circle" class="text-primary transition-all duration-1000" cx="88" cy="88" fill="transparent" r="80" stroke="currentColor" stroke-dasharray="502" stroke-dashoffset="502" stroke-width="10" stroke-linecap="round"></circle>
                    </svg>
                    <div class="absolute flex flex-col items-center">
                        <span id="progress-text" class="font-headline font-black text-5xl text-on-surface">0%</span>
                        <span id="label-dia" class="text-[10px] uppercase font-bold tracking-widest text-slate-400">Día 7</span>
                    </div>
                </div>
                <h2 id="titulo-dia" class="mt-6 font-headline font-extrabold text-2xl text-center">¡Casi llegas a tu hito!</h2>
                
                <div id="final-reward-card" class="mt-8 w-full bg-slate-50 rounded-3xl p-6 border-2 border-dashed border-slate-200 flex flex-col items-center text-center opacity-60 grayscale transition-all duration-700">
                    <div class="bg-white w-16 h-16 rounded-full shadow-inner flex items-center justify-center mb-4"><span id="gift-icon" class="material-symbols-outlined text-4xl text-slate-300">lock</span></div>
                    <div class="w-full">
                        <h4 id="reward-week-label" class="text-[10px] font-black uppercase tracking-[0.2em] text-primary mb-1">Semana 1</h4>
                        <h3 id="reward-title" class="font-headline font-bold text-lg text-slate-800 mb-2">Cargando meta...</h3>
                        <p id="reward-desc" class="text-[11px] text-slate-500 mb-4 px-4 italic">Completa tus rutinas para desbloquear.</p>
                        <button id="btn-regalo" onclick="validarYEntrar()" class="hidden w-full gold-gradient py-4 rounded-2xl text-white font-black tracking-widest text-[10px] uppercase shadow-xl hover:scale-105 transition-all">Reclamar Premio</button>
                    </div>
                </div>
            </section>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <article class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <div class="flex items-center gap-3 mb-6"><span class="material-symbols-outlined text-primary bg-primary/10 p-2 rounded-xl">light_mode</span><h3 class="font-bold text-sm uppercase tracking-tighter">Rutina Mañana</h3></div>
                    <div class="space-y-3">
                        <label class="flex items-center p-3 bg-slate-50 rounded-2xl cursor-pointer hover:bg-slate-100"><input id="check_m1" class="task-checkbox w-5 h-5 rounded border-slate-300 text-primary mr-3" type="checkbox"/><span class="text-xs font-medium">Limpieza Gel No-Comedogénico</span></label>
                        <label class="flex items-center p-3 bg-slate-50 rounded-2xl cursor-pointer hover:bg-slate-100"><input id="check_m2" class="task-checkbox w-5 h-5 rounded border-slate-300 text-primary mr-3" type="checkbox"/><span class="text-xs font-medium">Protector Solar FPS 50+</span></label>
                    </div>
                </article>
                <article class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <div class="flex items-center gap-3 mb-6"><span class="material-symbols-outlined text-primary bg-primary/10 p-2 rounded-xl">spa</span><h3 class="font-bold text-sm uppercase tracking-tighter">Hábitos Saludables</h3></div>
                    <div class="space-y-3">
                        <label class="flex items-center p-3 bg-slate-50 rounded-2xl cursor-pointer hover:bg-slate-100"><input id="check_h1" class="task-checkbox w-5 h-5 rounded border-slate-300 text-primary mr-3" type="checkbox"/><span class="text-xs font-medium">Dieta Antiinflamatoria</span></label>
                        <label class="flex items-center p-3 bg-slate-50 rounded-2xl cursor-pointer hover:bg-slate-100"><input id="check_h2" class="task-checkbox w-5 h-5 rounded border-slate-300 text-primary mr-3" type="checkbox"/><span class="text-xs font-medium">Sanitizar Smartphone</span></label>
                    </div>
                </article>
            </div>
        </main>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBR-Mh0UMUWuTC1kAj2TRc9Zz9z94VDoYQ",
      authDomain: "portal-piel-limpia.firebaseapp.com",
      projectId: "portal-piel-limpia",
      storageBucket: "portal-piel-limpia.firebasestorage.app",
      messagingSenderId: "398053436634",
      appId: "1:398053436634:web:08d83ef125b0f8080009e3"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const diaActual = 7;
    const recompensas = {
        7: { titulo: "Guía de Maquillaje Seguro", desc: "Evita productos que obstruyen tus poros.", week: "Semana 1" },
        14: { titulo: "Recetario Batidos Detox", desc: "Limpia tu hígado para sanar tu piel.", week: "Semana 2" },
        21: { titulo: "Masterclass: Piel Eterna", desc: "Mantén tus resultados para siempre.", week: "Final" }
    };

    const checkboxes = document.querySelectorAll('.task-checkbox');
    const circle = document.getElementById('progress-circle');
    const progressText = document.getElementById('progress-text');
    const rewardCard = document.getElementById('final-reward-card');
    const giftIcon = document.getElementById('gift-icon');

    // Cargar datos de Firestore al iniciar
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            document.getElementById('user-email').textContent = user.email;
            document.getElementById('label-dia').textContent = `Día ${diaActual}`;
            document.getElementById('reward-week-label').textContent = recompensas[diaActual].week;
            document.getElementById('reward-title').textContent = recompensas[diaActual].titulo;
            document.getElementById('reward-desc').textContent = recompensas[diaActual].desc;

            // BUSCAR LA MEMORIA EN FIREBASE
            const docRef = doc(db, "progreso", user.uid);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const data = docSnap.data()[`dia_${diaActual}`] || {};
                checkboxes.forEach(cb => {
                    if (data[cb.id] !== undefined) cb.checked = data[cb.id];
                });
            }
            updateProgress(false); // No guardar al cargar, solo mostrar
            document.getElementById('loader').classList.add('hidden');
        } else {
            window.location.href = "index.html"; // Redirigir al inicio (index)
        }
    });

    // Guardar datos en Firestore cada vez que se hace clic
    async function updateProgress(shouldSave = true) {
        const checkedCount = Array.from(checkboxes).filter(cb => cb.checked).length;
        const percentage = Math.round((checkedCount / checkboxes.length) * 100);
        
        circle.style.strokeDashoffset = 502 - (percentage / 100) * 502;
        progressText.textContent = `${percentage}%`;

        if (percentage === 100) {
            rewardCard.classList.remove('opacity-60', 'grayscale');
            rewardCard.classList.add('border-amber-400', 'bg-white', 'shadow-2xl');
            giftIcon.textContent = 'redeem';
            document.getElementById('btn-regalo').classList.remove('hidden');
            localStorage.setItem('regalo_nivel', diaActual);
            localStorage.setItem('reto_completado', 'true');
        } else {
            document.getElementById('btn-regalo').classList.add('hidden');
            localStorage.removeItem('reto_completado');
        }

        // ¡AQUÍ ES DONDE HABLA CON LA BASE DE DATOS!
        if (shouldSave && auth.currentUser) {
            const data = {};
            checkboxes.forEach(cb => data[cb.id] = cb.checked);
            try {
                await setDoc(doc(db, "progreso", auth.currentUser.uid), {
                    [`dia_${diaActual}`]: data
                }, { merge: true });
                console.log("¡Progreso guardado en Firebase!");
            } catch (e) {
                console.error("Error al guardar:", e);
            }
        }
    }

    checkboxes.forEach(cb => cb.addEventListener('change', () => updateProgress(true)));
    window.validarYEntrar = () => window.location.href = "Regalo.html";

</script>
</body></html>
