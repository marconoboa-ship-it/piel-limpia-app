<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Piel Limpia</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --verde-primario: #1c5c32;
            --verde-claro: #f4f7f6;
            --gris-texto: #555;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--verde-claro);
            margin: 0;
            padding: 20px;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Contenedor Principal: Amplio y Estable */
        .dashboard-container {
            width: 100%;
            max-width: 550px; /* Ancho restaurado para mayor armonía */
            background: white;
            padding: 45px 40px;
            border-radius: 24px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.06);
            position: relative;
            box-sizing: border-box;
        }

        /* Botón Logout */
        #btn-logout {
            position: absolute;
            top: 25px;
            right: 25px;
            background: transparent;
            color: var(--verde-primario);
            border: 1.5px solid var(--verde-primario);
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #btn-logout:hover {
            background-color: var(--verde-primario);
            color: white;
        }

        /* Encabezado */
        .header {
            text-align: center;
            margin-bottom: 35px;
            margin-top: 5px;
        }

        .header img {
            max-width: 120px;
            margin-bottom: 15px;
        }
        
        .header h2 {
            font-size: 22px;
            margin: 0;
            color: #1a1a1a;
        }

        /* Barra de Progreso */
        .progress-section {
            margin-bottom: 35px;
        }

        .progress-bar-bg {
            background: #e2e8f0;
            height: 12px;
            border-radius: 10px;
            overflow: hidden;
        }

        #progress-fill {
            background: linear-gradient(90deg, #1c5c32, #2d8a4e);
            height: 100%;
            width: 0%;
            transition: width 0.5s ease;
        }

        /* Calendario de 21 Días - Proporción Perfecta */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr); /* Se adapta al ancho disponible */
            gap: 12px; /* Separación armónica */
            margin-bottom: 35px;
        }

        .day-box {
            aspect-ratio: 1; /* Mantiene la forma de cuadrado perfecto siempre */
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            border: 2px solid #eaeaea;
            color: #bbb;
            background-color: #fafafa;
        }

        .day-active {
            border-color: var(--verde-primario);
            color: var(--verde-primario);
            background-color: #e6f0e9;
            transform: scale(1.05); /* Efecto de resalte sutil */
            box-shadow: 0 4px 10px rgba(28, 92, 50, 0.15);
        }

        .day-completed {
            background-color: var(--verde-primario);
            color: white;
            border-color: var(--verde-primario);
        }

        /* Tareas del Día */
        .task-list {
            text-align: left;
        }

        .task-list h3 {
            font-size: 16px;
            margin-bottom: 15px;
            color: #333;
        }

        .task-item {
            display: flex;
            align-items: center;
            background: #f8fafc;
            padding: 14px 18px;
            margin-bottom: 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.3s;
            font-size: 14px;
            font-weight: 500;
            color: #444;
            border: 1px solid transparent;
        }

        .task-item:hover { 
            background: #f0f4f1; 
            border-color: #d1e0d5;
        }

        .checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid var(--verde-primario);
            border-radius: 6px;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .checked .checkbox::after {
            content: '✓';
            color: var(--verde-primario);
            font-weight: bold;
            font-size: 14px;
        }
        
        .checked span {
            text-decoration: line-through;
            color: #999;
        }

        .vip-link {
            display: block;
            margin-top: 35px;
            text-align: center;
            color: #D4AF37;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.5px;
            padding: 15px;
            border-radius: 10px;
            background-color: #fafafa;
            border: 1px dashed #D4AF37;
            transition: all 0.3s;
        }
        
        .vip-link:hover {
            background-color: #fff9e6;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <button id="btn-logout">Cerrar Sesión</button>
        
        <div class="header">
            <img src="logo.png" alt="Piel Limpia">
            <h2 id="day-title">Día 1: Iniciando tu Protocolo</h2>
        </div>

        <div class="progress-section">
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 13px; font-weight: 700; color: #555;">
                <span>Progreso General</span>
                <span id="progress-text">0%</span>
            </div>
            <div class="progress-bar-bg">
                <div id="progress-fill"></div>
            </div>
        </div>

        <div id="calendar" class="calendar-grid">
            </div>

        <div class="task-list" id="task-container">
            <h3>Tareas Clínicas de Hoy:</h3>
            <div class="task-item" onclick="toggleTask(this)">
                <div class="checkbox"></div>
                <span>Limpieza Facial Am/Pm (Doble limpieza)</span>
            </div>
            <div class="task-item" onclick="toggleTask(this)">
                <div class="checkbox"></div>
                <span>Tomar Suplemento Control Acné</span>
            </div>
            <div class="task-item" onclick="toggleTask(this)">
                <div class="checkbox"></div>
                <span>Beber 2 Litros de Agua Mineral</span>
            </div>
            <div class="task-item" onclick="toggleTask(this)">
                <div class="checkbox"></div>
                <span>Cero Lácteos y Azúcar Refinada hoy</span>
            </div>
            <div class="task-item" onclick="toggleTask(this)">
                <div class="checkbox"></div>
                <span>Batido Detox / Nutrición Celular</span>
            </div>
        </div>

        <a href="Paywall.html" class="vip-link">✨ DESBLOQUEAR ACOMPAÑAMIENTO VIP ✨</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBR-Mh0UMUWuTC1kAj2TRc9Zz9z94VDoYQ",
          authDomain: "portal-piel-limpia.firebaseapp.com",
          projectId: "portal-piel-limpia",
          storageBucket: "portal-piel-limpia.firebasestorage.app",
          messagingSenderId: "398053436634",
          appId: "1:398053436634:web:08d83ef125b0f8080009e3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Seguridad y Logout
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "index.html"; 
            } else {
                inicializarDashboard(user);
            }
        });

        document.getElementById('btn-logout').addEventListener('click', () => {
            const btn = document.getElementById('btn-logout');
            btn.innerText = "Saliendo...";
            signOut(auth).then(() => {
                window.location.href = "index.html";
            }).catch((error) => console.error(error));
        });

        // Motor del Tiempo
        function inicializarDashboard(user) {
            const calendarEl = document.getElementById('calendar');
            const creationTime = user.metadata.creationTime;
            const startDate = new Date(creationTime);
            const today = new Date();
            
            const diffTime = Math.abs(today - startDate);
            const currentDay = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            document.getElementById('day-title').innerText = `Día ${currentDay}: Protocolo Activo`;

            calendarEl.innerHTML = "";
            for (let i = 1; i <= 21; i++) {
                const dayBox = document.createElement('div');
                dayBox.classList.add('day-box');
                dayBox.innerText = i;
                
                if (i < currentDay) dayBox.classList.add('day-completed');
                else if (i === currentDay) dayBox.classList.add('day-active');
                
                calendarEl.appendChild(dayBox);
            }

            const progress = Math.min(Math.round(((currentDay - 1) / 21) * 100), 100);
            document.getElementById('progress-fill').style.width = progress + "%";
            document.getElementById('progress-text').innerText = progress + "%";
        }
    </script>

    <script>
        // Efecto visual de tachar tareas
        function toggleTask(element) {
            element.classList.toggle('checked');
        }
    </script>
</body>
</html>
