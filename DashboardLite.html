 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Piel Limpia</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --verde-primario: #1c5c32;
            --verde-claro: #f4f7f6;
            --gris-texto: #555;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--verde-claro);
            margin: 0;
            padding: 20px;
            color: #333;
        }

        /* Contenedor Principal */
        .dashboard-container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            position: relative;
        }

        /* Botón Logout Premium */
        #btn-logout {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            color: var(--verde-primario);
            border: 1.5px solid var(--verde-primario);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #btn-logout:hover {
            background-color: var(--verde-primario);
            color: white;
        }

        /* Encabezado con tu Logo */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header img {
            max-width: 140px;
            margin-bottom: 10px;
        }

        /* Barra de Progreso */
        .progress-section {
            margin-bottom: 30px;
        }

        .progress-bar-bg {
            background: #e2e8f0;
            height: 12px;
            border-radius: 10px;
            overflow: hidden;
        }

        #progress-fill {
            background: linear-gradient(90deg, #1c5c32, #2d8a4e);
            height: 100%;
            width: 0%;
            transition: width 0.5s ease;
        }

        /* Calendario de 21 Días (Corregido) */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr); /* <-- El guion fue eliminado de 1fr */
            gap: 10px;
            margin-bottom: 30px;
        }

        .day-box {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-weight: 700;
            font-size: 14px;
            border: 2px solid #eee;
            color: #ccc;
        }

        .day-active {
            border-color: var(--verde-primario);
            color: var(--verde-primario);
            background-color: #e6f0e9;
        }

        .day-completed {
            background-color: var(--verde-primario);
            color: white;
            border-color: var(--verde-primario);
        }

        /* Tareas del Día */
        .task-list {
            text-align: left;
        }

        .task-item {
            display: flex;
            align-items: center;
            background: #f9f9f9;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .task-item:hover { background: #f0f4f1; }

        .checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid var(--verde-primario);
            border-radius: 5px;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .checked .checkbox::after {
            content: '✓';
            color: var(--verde-primario);
            font-weight: bold;
        }

        .vip-link {
            display: block;
            margin-top: 30px;
            text-align: center;
            color: #AA8222;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <button id="btn-logout">Cerrar Sesión</button>
        
        <div class="header">
            <img src="logo.png" alt="Piel Limpia">
            <h2 id="day-title">Día 1: Iniciando tu Protocolo</h2>
        </div>

        <div class="progress-section">
            <div style="display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; font-weight: 600;">
                <span>Progreso General</span>
                <span id="progress-text">0%</span>
            </div>
            <div class="progress-bar-bg">
                <div id="progress-fill"></div>
            </div>
        </div>

        <div id="calendar" class="calendar-grid">
            </div>

        <div class="task-list" id="task-container">
            <h3>Tareas de Hoy:</h3>
            <div class="task-item" onclick="toggleTask(this)">
                <div class="checkbox"></div>
                <span>Limpieza Facial Am/Pm</span>
            </div>
            <div class="task-item" onclick="toggleTask(this)">
                <div class="checkbox"></div>
                <span>Suplemento Control Acné</span>
            </div>
            <div class="task-item" onclick="toggleTask(this)">
                <div class="checkbox"></div>
                <span>Batido Detox / Nutrición</span>
            </div>
        </div>

        <a href="Paywall.html" class="vip-link">✨ DESBLOQUEAR ACOMPAÑAMIENTO VIP ✨</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBR-Mh0UMUWuTC1kAj2TRc9Zz9z94VDoYQ",
          authDomain: "portal-piel-limpia.firebaseapp.com",
          projectId: "portal-piel-limpia",
          storageBucket: "portal-piel-limpia.firebasestorage.app",
          messagingSenderId: "398053436634",
          appId: "1:398053436634:web:08d83ef125b0f8080009e3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 1. SEGURIDAD: Verificar sesión y manejar Logout
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "index.html"; 
            } else {
                inicializarDashboard(user);
            }
        });

        // Lógica del botón Logout
        document.getElementById('btn-logout').addEventListener('click', () => {
            const btn = document.getElementById('btn-logout');
            btn.innerText = "Saliendo...";
            signOut(auth).then(() => {
                window.location.href = "index.html";
            }).catch((error) => {
                console.error("Error al salir", error);
                btn.innerText = "Error";
            });
        });

        // 2. MOTOR DEL TIEMPO Y PROGRESO
        function inicializarDashboard(user) {
            const calendarEl = document.getElementById('calendar');
            const creationTime = user.metadata.creationTime;
            const startDate = new Date(creationTime);
            const today = new Date();
            
            // Calcular día actual del reto
            const diffTime = Math.abs(today - startDate);
            const currentDay = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            document.getElementById('day-title').innerText = `Día ${currentDay}: Protocolo Activo`;

            // Generar Calendario Visual
            calendarEl.innerHTML = "";
            for (let i = 1; i <= 21; i++) {
                const dayBox = document.createElement('div');
                dayBox.classList.add('day-box');
                dayBox.innerText = i;
                
                if (i < currentDay) dayBox.classList.add('day-completed');
                else if (i === currentDay) dayBox.classList.add('day-active');
                
                calendarEl.appendChild(dayBox);
            }

            // Actualizar barra de progreso basado en el día
            const progress = Math.min(Math.round(((currentDay - 1) / 21) * 100), 100);
            document.getElementById('progress-fill').style.width = progress + "%";
            document.getElementById('progress-text').innerText = progress + "%";
        }
    </script>

    <script>
        // Lógica visual de tareas (Local)
        function toggleTask(element) {
            element.classList.toggle('checked');
        }
    </script>
</body>
</html>
