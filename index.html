  <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piel Limpia - Clínica Virtual</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* Estética Clínica Premium unificada con el logo */
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #e6f0f0 0%, #f4f7f6 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }
        
        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            box-sizing: border-box;
        }

        .login-container {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 40px 40px; /* Un poco menos de padding arriba por el logo */
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(28, 92, 50, 0.1), 0 5px 15px rgba(0,0,0,0.05); /* Sombra con toque verde del logo */
            text-align: center;
            backdrop-filter: blur(10px);
        }

        /* --- SECCIÓN DEL LOGO ACTUALIZADA --- */
        .logo-container {
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .logo-img {
            max-width: 180px; /* Ajuste para que se vea elegante pero no gigante */
            height: auto;
            display: block;
        }

        /* Eliminamos logo-text y logo-icon porque ya están integrados en la imagen */
        
        .subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 35px;
            font-weight: 400;
        }

        /* --- FORMULARIO CON TONOS UNIFICADOS CON EL LOGO --- */
        .input-group {
            margin-bottom: 20px;
            text-align: left;
            position: relative;
        }
        
        .input-group label {
            display: block;
            font-size: 12px;
            margin-bottom: 8px;
            color: #1c5c32; /* El color verde oscuro del logo para los labels */
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .input-group input {
            width: 100%;
            padding: 15px;
            background-color: #f8fafc;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Montserrat', sans-serif;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        
        .input-group input:focus {
            border-color: #1c5c32; /* Verde oscuro del logo en el focus */
            background-color: #fff;
            outline: none;
            box-shadow: 0 0 0 4px rgba(28, 92, 50, 0.1);
        }

        /* --- BOTÓN PRINCIPAL CON DEGRADADO VERDE DEL LOGO --- */
        .btn-main {
            width: 100%;
            /* Un degradado elegante usando los tonos de verde de tu logo */
            background: linear-gradient(135deg, #1c5c32, #113f21);
            color: white;
            border: none;
            padding: 16px;
            font-size: 15px;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
            margin-bottom: 25px;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(28, 92, 50, 0.3);
        }
        
        .btn-main:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(28, 92, 50, 0.4);
        }

        /* --- TEXTO DE CAMBIO (LOGIN/REGISTRO) --- */
        .toggle-text {
            font-size: 14px;
            color: #666;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }
        
        .toggle-text span {
            color: #1c5c32; /* Verde oscuro del logo */
            font-weight: 700;
            cursor: pointer;
            transition: color 0.3s;
        }
        
        .toggle-text span:hover {
            color: #113f21;
            text-decoration: underline;
        }
        
        #error-message {
            color: #e53e3e;
            background-color: #fff5f5;
            border: 1px solid #feb2b2;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 15px;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-container">
            
            <div class="logo-container">
                <img src="logo.png" alt="Logo Piel Limpia" class="logo-img">
            </div>

            <div class="subtitle" id="form-subtitle">Ingresa a tu clínica digital</div>

            <form id="auth-form">
                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" required placeholder="tu@correo.com">
                </div>
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required placeholder="Mínimo 6 caracteres">
                </div>
                
                <div id="error-message"></div>

                <button type="submit" class="btn-main" id="submit-btn">Entrar al Reto</button>
            </form>

            <div class="toggle-text" id="toggle-container">
                ¿No tienes cuenta? <span id="toggle-btn">Regístrate gratis aquí</span>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

        // NOTA: Para producción real, estas llaves deben protegerse, pero para este prototipo MVP están bien aquí.
        const firebaseConfig = {
          apiKey: "AIzaSyBR-Mh0UMUWuTC1kAj2TRc9Zz9z94VDoYQ",
          authDomain: "portal-piel-limpia.firebaseapp.com",
          projectId: "portal-piel-limpia",
          storageBucket: "portal-piel-limpia.firebasestorage.app",
          messagingSenderId: "398053436634",
          appId: "1:398053436634:web:08d83ef125b0f8080009e3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        let isLogin = true; 
        const form = document.getElementById('auth-form');
        const submitBtn = document.getElementById('submit-btn');
        const toggleBtn = document.getElementById('toggle-btn');
        const subtitle = document.getElementById('form-subtitle');
        const toggleContainer = document.getElementById('toggle-container');
        const errorMsg = document.getElementById('error-message');

        toggleBtn.addEventListener('click', () => {
            isLogin = !isLogin;
            if (isLogin) {
                subtitle.innerText = "Ingresa a tu clínica digital";
                submitBtn.innerText = "Entrar al Reto";
                toggleContainer.innerHTML = '¿No tienes cuenta? <span id="toggle-btn" style="color: #1c5c32; font-weight: 700; cursor: pointer;">Regístrate gratis aquí</span>';
            } else {
                subtitle.innerText = "Comienza tu transformación de 21 días";
                submitBtn.innerText = "Crear Mi Cuenta Gratis";
                toggleContainer.innerHTML = '¿Ya tienes cuenta? <span id="toggle-btn" style="color: #1c5c32; font-weight: 700; cursor: pointer;">Inicia sesión aquí</span>';
            }
            
            document.getElementById('toggle-btn').addEventListener('click', toggleBtn.click);
            errorMsg.style.display = 'none';
        });

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            submitBtn.innerText = "Cargando...";

            if (isLogin) {
                signInWithEmailAndPassword(auth, email, password)
                    .then((userCredential) => {
                        window.location.href = "DashboardLite.html";
                    })
                    .catch((error) => {
                        errorMsg.innerText = "Error: Correo o contraseña incorrectos.";
                        errorMsg.style.display = 'block';
                        submitBtn.innerText = "Entrar al Reto";
                    });
            } else {
                createUserWithEmailAndPassword(auth, email, password)
                    .then((userCredential) => {
                        window.location.href = "DashboardLite.html";
                    })
                    .catch((error) => {
                        let mensaje = "Ocurrió un error. Intenta de nuevo.";
                        if(error.code === 'auth/email-already-in-use') mensaje = "Este correo ya está registrado.";
                        if(error.code === 'auth/weak-password') mensaje = "La contraseña debe tener al menos 6 caracteres.";
                        
                        errorMsg.innerText = mensaje;
                        errorMsg.style.display = 'block';
                        submitBtn.innerText = "Crear Mi Cuenta Gratis";
                    });
            }
        });
    </script>
</body>
</html>
